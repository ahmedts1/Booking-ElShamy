<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>حجز مراجعة الفيزياء | إبراهيم الشامي</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main class="page">

    <section class="hero">
      <div class="tag">⚡ مراجعة ليلة الامتحان</div>
      <h1>احجز موعدك في مراجعة الفيزياء</h1>
      <p>مع المهندس إبراهيم الشامي</p>
    </section>

    <section class="booking-card">
      <form id="bookingForm">

        <div class="form-group">
          <label for="studentName">اسم الطالب</label>
          <input 
            type="text" 
            id="studentName" 
            placeholder="اكتب اسمك بالكامل" 
            required 
          />
        </div>

        <div class="form-group">
          <label for="phone">رقم الهاتف</label>
          <input 
            type="tel" 
            id="phone" 
            placeholder="مثال: 01012345678" 
            required 
          />
        </div>

        <div class="form-group">
          <label>النوع </label>

          <div class="gender-options">
            <label class="radio-card">
              <input type="radio" name="gender" value="ذكر" required />
              <span>ذكر</span>
            </label>

            <label class="radio-card">
              <input type="radio" name="gender" value="أنثى" required />
              <span>أنثى</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="area">اختر المنطقة</label>
          <select id="area" required>
            <option value="">اختر المنطقة</option>
            <option value="أم خنان">أم خنان</option>
            <option value="اسطنها">اسطنها</option>
            <option value="أشليم">أشليم</option>
          </select>
        </div>

        <div id="groupsContainer" class="groups-container hidden">
          <h3>اختر المجموعة المناسبة</h3>
          <div id="groupsList" class="groups-list"></div>
        </div>

        <button type="submit" class="main-btn">
          تأكيد الحجز
        </button>

        <div id="message" class="message hidden"></div>

      </form>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
