<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تسجيل طلاب الصف الثاني الثانوي">
  <title>تسجيل الصف الثاني الثانوي</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="tag">المهندس إبراهيم الشامي</span>
      <h1>تسجيل الصف الثاني الثانوي</h1>
      <p>اكتب بياناتك بشكل صحيح ثم اضغط على زر التسجيل.</p>
    </section>

    <section class="form-card">
      <form id="registrationForm" novalidate>
        <div class="form-image-wrapper">
  <img
    src="images/form-image.jpg"
    alt="صورة التسجيل"
    class="form-image"
  />
</div>
        <div class="form-group">
          <label for="studentName">الاسم بالكامل</label>
          <input id="studentName" type="text" placeholder="اكتب اسم الطالب بالكامل" minlength="3" maxlength="100" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="phone">رقم الهاتف</label>
          <input id="phone" type="tel" inputmode="numeric" placeholder="مثال: 01012345678" maxlength="11" autocomplete="tel" required>
        </div>

        <div class="form-group">
          <label for="area">(سنتر)البلد</label>
          <select id="area" required>
            <option value="">اختر البلد</option>
            <option value="اسطنها">اسطنها</option>
            <option value="بطا">بطا</option>
            <option value="أشليم">أشليم</option>
            <option value="أم خنان">أم خنان</option>
            <option value="قبالة">قبالة</option>
          </select>
        </div>

        <fieldset class="form-group">
          <legend>النوع</legend>
          <div class="choice-grid">
            <label class="choice-card">
              <input type="radio" name="gender" value="ولد" required>
              <span>ولد</span>
            </label>
            <label class="choice-card">
              <input type="radio" name="gender" value="بنت" required>
              <span>بنت</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="form-group">
          <legend>نظام الدراسة</legend>
          <div class="choice-grid">
            <label class="choice-card">
              <input type="radio" name="studySystem" value="ثانوية عامة" required>
              <span>ثانوية عامة</span>
            </label>
            <label class="choice-card">
              <input type="radio" name="studySystem" value="بكالوريا" required>
              <span>بكالوريا</span>
            </label>
          </div>
        </fieldset>

        <button id="submitButton" class="main-btn" type="submit">تسجيل البيانات</button>
        <div id="message" class="message hidden" role="alert" aria-live="polite"></div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
