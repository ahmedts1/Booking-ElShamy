<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة بيانات الطلاب</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-page{width:min(100% - 24px,1200px);margin:auto;padding:35px 0}.admin-card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 15px 40px rgba(38,73,119,.12)}.admin-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}.admin-head h1{margin:0}.filters{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;margin-bottom:18px}.export-btn{border:0;border-radius:10px;padding:11px 16px;background:#08783e;color:#fff;font-weight:700;cursor:pointer}.stats{margin-bottom:16px;font-weight:700;color:#0756b8}.table-wrapper{overflow:auto;border:1px solid #d9e3f0;border-radius:12px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:12px;border-bottom:1px solid #e7edf5;text-align:right}th{background:#eef5ff;white-space:nowrap}tbody tr:hover{background:#fbfdff}@media(max-width:700px){.filters{grid-template-columns:1fr}.admin-card{padding:14px}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="admin-page">
    <section class="admin-card">
      <div class="admin-head">
        <div><h1>بيانات الطلاب</h1><div id="stats" class="stats">جاري التحميل...</div></div>
        <button class="export-btn" onclick="exportRegistrationsCSV()">تصدير CSV</button>
      </div>
      <div class="filters">
        <select id="filterArea"><option value="">كل البلاد</option><option>اسطنها</option><option>بطا</option><option>أشليم</option><option>أم خنان</option><option>قبالة</option></select>
        <select id="filterGender"><option value="">كل الأنواع</option><option>ولد</option><option>بنت</option></select>
        <select id="filterSystem"><option value="">كل الأنظمة</option><option>ثانوية عامة</option><option>بكالوريا</option></select>
      </div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>الاسم</th><th>رقم الهاتف</th><th>البلد</th><th>النوع</th><th>نظام الدراسة</th><th>وقت التسجيل</th></tr></thead>
          <tbody id="registrationsTable"><tr><td colspan="6">جاري تحميل البيانات...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./admin.js"></script>
</body>
</html>
